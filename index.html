<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vobys - Gestão de Pessoas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Header Section -->
  <header class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center py-4">
      <!-- Logo -->
      <div class="shrink-0">
        <img src="images/logo.png" alt="Vobys" class="h-10 w-10 rounded-full">
      </div>
      <!-- Title -->
      <div class="ml-4">
        <h1 class="text-2xl font-bold text-gray-800">Vobys - Gestão de Pessoas</h1>
      </div>
    </div>
  </header>

  <!-- Main Section -->
  <main class="py-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <section class="bg-white p-6 rounded-lg shadow-lg">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Bem-vindo</h2>
        <p class="text-gray-600 leading-6">
          Vobys é uma plataforma moderna e eficiente para gestão de pessoas. 
          Nosso objetivo é simplificar processos, melhorar a comunicação e ajudar você a alcançar o sucesso organizacional.
        </p>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer class="mt-8 bg-gray-800 text-gray-500 py-4">
    <div class="text-center text-sm">
      &copy; 2023 Vobys. Todos os direitos reservados.
    </div>
  </footer>
</body>
</html>
